name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Docker-relevant paths
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            echo "docker=true" >> "$GITHUB_OUTPUT"
            echo "No usable base revision found; running Docker smoke builds."
            exit 0
          fi

          changed_files="$(git diff --name-only "$base" "$head")"
          echo "$changed_files"

          if echo "$changed_files" | grep -E '^(apps/(web|agent)/|packages/(contracts|ui)/|package\.json|package-lock\.json|\.github/workflows/ci\.yml)$' >/dev/null; then
            echo "docker=true" >> "$GITHUB_OUTPUT"
            echo "Docker-relevant changes detected."
          else
            echo "docker=false" >> "$GITHUB_OUTPUT"
            echo "No Docker-relevant changes detected."
          fi

  web:
    name: Web workspace
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install JS workspace dependencies
        run: npm ci

      - name: Typecheck workspaces
        run: npm run typecheck

      - name: Build workspaces
        run: npm run build

      - name: Run web tests
        run: npm run test --workspace @prosody/web --if-present

  agent:
    name: Agent package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install agent dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e apps/agent

      - name: Compile agent package
        run: python -m compileall apps/agent/app

      - name: Run agent tests
        run: |
          if find apps/agent/tests -type f -name 'test_*.py' | grep -q .; then
            python -m pytest apps/agent/tests
          else
            echo "No agent pytest tests found; skipping."
          fi

  docker-smoke:
    name: Docker smoke builds
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build web image
        run: |
          docker build \
            -f apps/web/Dockerfile \
            -t prosody-web:ci-smoke \
            --build-arg VITE_AGENT_BASE_URL=http://localhost:8000 \
            --build-arg VITE_ENABLE_LIVE_VOICE=0 \
            --build-arg VITE_ENABLE_UI_DEMO_TOOLS=0 \
            --build-arg VITE_SUPABASE_URL=https://example.supabase.co \
            --build-arg VITE_SUPABASE_ANON_KEY=example \
            .

      - name: Build agent image
        run: docker build -f apps/agent/Dockerfile -t prosody-agent:ci-smoke .
